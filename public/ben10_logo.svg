<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ben10-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#000" stroke="#00ff00" stroke-width="2" />
  <path d="M50 5 L50 15 M50 85 L50 95 M5 50 L15 50 M85 50 L95 50" stroke="#00ff00" stroke-width="4" />
  <text x="50" y="65" text-anchor="middle" font-family="Impact, sans-serif" font-size="40" fill="#00ff00" filter="url(#ben10-glow)" style="font-weight:900; letter-spacing:-2px;">
    AN
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" />
  </text>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#00ff00" stroke-width="1" stroke-dasharray="10 5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
  </circle>
</svg>
